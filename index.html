    <meta property="og:description" content="Bosan belajar Nahwu yang kaku? Coba Nahwu Card Master! Swipe kartunya, tentukan I'robnya, dan jadilah master Nahwu. Powered by Amogenz.">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="table"></div>
<div id="rim"></div>

<div id="app">
<div id="topbar">
  <div class="tb-header">
    <div class="tb-label">Nahwu Card Master <br> Amogenz.Inc </div>
    <div id="lbl-word">—</div>
    <div id="lbl-cnt">0/0</div>
  </div>
  <div class="prog"><div id="prog-fill"></div></div>
  <div id="dots"></div>
</div>

<div class="nav-actions">
  <button id="btn-share" onclick="shareGame()" title="Bagikan Game">
    <i class="ph ph-share-network"></i>
  </button>

  <a href="home.html" id="btn-home">
    <i class="ph ph-house"></i> HOME
  </a>

  <button id="btn-surrender" onclick="surrender()">
    🏳️ MENYERAH
  </button>
</div>

<div id="sbox"><div id="sentence">...</div></div>

  <div id="dropzone">
    <div id="qtext">Pilih jawaban...</div>
    <div class="dz-hint">↑ Flick kartu ke sini untuk jawab</div>
  </div>

  <div id="stage"><div id="deck"></div></div>

  <div id="hint">◀ Geser kiri/kanan pilih kartu &nbsp;•&nbsp; <br>Flick atas untuk jawab ▲</div>
</div>

<div id="modal">
  <div class="mbox">
    <div id="m-suit">♠</div>
    <h2 id="m-title">MUMTAZ!</h2>
    <p id="m-desc"></p>
    <button class="btn-ok" onclick="closeModal()">LANJUTKAN ▶</button>
  </div>
</div>

<div id="rdone">
  <div class="rd-box">
    <div class="rd-icon">🃏</div>
    <div class="rd-title">KALIMAT SELESAI!</div>
    <div class="rd-sub">Memuat kalimat berikutnya...</div>
  </div>
</div>
<div id="demo-overlay" style="display:none;">
  <div class="demo-hand" id="hand">
    <i class="ph-fill ph-hand-pointing"></i>
  </div>
  <div id="demo-text">Geser kartu untuk memilih...</div>
</div>

<script type="module" src="script.js"> </script>
</body>
</html>
